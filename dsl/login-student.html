<!DOCTYPE html>
<html lang="en">
<head>
  <!-- CO5: Security Headers -->
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; font-src https://fonts.gstatic.com;">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login — Digital Smart Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb-wrap">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-page page-wrap">
    <div class="login-card">
      <a href="index.html" class="login-back">← Back to Home</a>

      <div class="login-logo">
        <span class="login-logo-icon">🎓</span>
        <div class="login-title">Student Login</div>
        <div class="login-subtitle">Access your learning dashboard</div>
      </div>

      <div class="login-divider"></div>

      <div class="form-group">
        <label class="form-label">Student ID / Email</label>
        <input type="text" id="student-id" class="form-input" placeholder="e.g. STU2024001 or name@email.com" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="student-pass" class="form-input" placeholder="e.g. 100@klu" oninput="validatePasswordLive(this)">
        <div id="pass-hint" style="margin-top:0.45rem; font-size:0.75rem; color:var(--text3); font-family:var(--font-mono); line-height:1.6;">
          Must contain: <span id="hint-nums" style="color:#ff6b6b;">✗ 3+ digits</span> &nbsp;·&nbsp;
          <span id="hint-special" style="color:#ff6b6b;">✗ 1 special char</span> &nbsp;·&nbsp;
          <span id="hint-letters" style="color:#ff6b6b;">✗ 3+ letters</span>
        </div>
      </div>

      <button class="btn btn-primary btn-full" onclick="studentLogin()">
        🔓 Login to Dashboard
      </button>

      <div style="margin-top:1rem; text-align:center; font-size:0.78rem; color:var(--text3);">
        Password format: <code style="color:var(--cyan);">100@klu</code> (3+ digits, 1 special char, 3+ letters)
      </div>

      <div class="login-divider"></div>
      <div style="text-align:center; font-size:0.8rem; color:var(--text3);">
        Are you a Librarian? <a href="login-librarian.html" style="color:var(--cyan);">Login here</a>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
  <script>
    function validatePassword(pass) {
      const hasThreeNums    = (pass.match(/\d/g) || []).length >= 3;
      const hasSpecialChar  = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(pass);
      const hasThreeLetters = (pass.match(/[a-zA-Z]/g) || []).length >= 3;
      return { hasThreeNums, hasSpecialChar, hasThreeLetters,
               valid: hasThreeNums && hasSpecialChar && hasThreeLetters };
    }

    function validatePasswordLive(input) {
      const r = validatePassword(input.value);
      const ok = '#4ade80', fail = '#ff6b6b';
      document.getElementById('hint-nums').style.color    = r.hasThreeNums    ? ok : fail;
      document.getElementById('hint-nums').textContent    = (r.hasThreeNums    ? '✓' : '✗') + ' 3+ digits';
      document.getElementById('hint-special').style.color = r.hasSpecialChar   ? ok : fail;
      document.getElementById('hint-special').textContent = (r.hasSpecialChar   ? '✓' : '✗') + ' 1 special char';
      document.getElementById('hint-letters').style.color = r.hasThreeLetters  ? ok : fail;
      document.getElementById('hint-letters').textContent = (r.hasThreeLetters  ? '✓' : '✗') + ' 3+ letters';
    }

    function studentLogin() {
      const id = document.getElementById('student-id').value.trim();
      const pass = document.getElementById('student-pass').value.trim();
      if (!id || !pass) { showToast('Please enter your ID and password', 'err'); return; }

      const v = validatePassword(pass);
      if (!v.hasThreeNums)    { showToast('Password needs at least 3 digits (e.g. 100@klu)', 'err'); return; }
      if (!v.hasSpecialChar)  { showToast('Password needs at least 1 special character like @, #, !', 'err'); return; }
      if (!v.hasThreeLetters) { showToast('Password needs at least 3 letters (e.g. 100@klu)', 'err'); return; }

      // Find or create student in DB
      let users = getUsers();
      let user = users.find(u => u.role === 'student' && (u.id === id || u.email === id));
      if (!user) {
        // Auto-register demo user
        user = {
          id: id,
          name: id.includes('@') ? id.split('@')[0] : id,
          email: id.includes('@') ? id : id + '@library.edu',
          role: 'student',
          joinDate: new Date().toISOString().slice(0,10),
          booksIssued: 0,
          fine: 0,
          status: 'active'
        };
        users.push(user);
        saveUsers(users);
      }

      setCurrentUser(user);
      showToast('Welcome back, ' + user.name + '! 👋', 'ok');
      setTimeout(() => window.location.href = 'dashboard-student.html', 900);
    }

    // Allow Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') studentLogin(); });
  </script>
</body>
</html>
